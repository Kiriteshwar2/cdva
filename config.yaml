seed: 42

paths:
  run_dir: runs/cdvae

dataset:
  processed_jsonl: cache/mp/mp_structures_79bd093e52ec/processed_structures.jsonl
  species_vocab: cache/mp/mp_structures_79bd093e52ec/species_vocab.json
  cache_root: cache/mp
  dataset_name: mp_structures
  max_materials: 120000
  max_elements: 3
  max_atoms: 50
  chunk_size: 500
  include_gnome: false
  include_deprecated: false
  allow_disordered: false
  timeout_seconds: 60
  cutoff_angstrom: 5.0
  max_neighbors: 32
  val_ratio: 0.1
  graph_cache_dir: cache/mp/mp_structures_79bd093e52ec/graphs
  force_rebuild_graphs: false
  precompute_graphs: true

model:
  hidden_dim: 192
  latent_dim: 256
  num_encoder_layers: 4
  num_rbf: 32
  dropout: 0.1

training:
  batch_size: 16              # ↓ critical (memory + stability)
  num_workers: 0
  epochs: 200
  learning_rate: 0.0002       # ↓ MASSIVE fix
  weight_decay: 0.00001
  grad_clip_norm: 1.0         # ↓ prevents explosion
  kl_beta: 0.001
  min_distance_angstrom: 1.2

  lr_decay_factor: 0.5
  lr_patience: 5

  kl_annealing:
    start_beta: 0.0
    end_beta: 0.001
    warmup_epochs: 30

  curriculum_stages:
    - name: bootstrap
      max_samples: 5000       # ↓ smoother start
      epochs: 20
    - name: scaleup
      max_samples: 20000
      epochs: 80
    - name: full
      max_samples: 50000
      epochs: 100

  loss_weights:
    count: 1.0
    atom_type: 1.0
    coord: 5.0                # ↓ big stabilization
    lattice: 2.0
    kl: 0.01                  # ↓ prevents KL explosion
    distance_consistency: 0.1
    symmetry_consistency: 0.05
    refinement: 0.2
    energy_proxy: 0.005       # ↓ very important
    volume: 0.005
    matching_unmatched: 1.0
    min_separation: 0.2
